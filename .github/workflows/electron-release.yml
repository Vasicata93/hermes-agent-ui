name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*' # Se declanșează la push-ul unui tag de versiune (ex: v1.0.0)
  workflow_dispatch: # Permite rularea manuală din GitHub Actions tab

permissions:
  contents: write # Permite crearea release-ului și upload-ul artefactelor

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # Construim pentru Windows și macOS
        os: [windows-latest, macos-latest]

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Electron App
        run: npm run build

      - name: Build and Publish Electron
        run: npx electron-builder --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pentru macOS, vei avea nevoie de certificate pentru a semna aplicația
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}